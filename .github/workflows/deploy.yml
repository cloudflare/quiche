on:
  push:
    branches:
      - master

name: Deploy

env:
  RUSTDOCFLAGS: "--cfg docsrs"

jobs:
  docs:
    permissions:
      contents: write  # crazy-max/ghaction-github-pages pushes to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install qlog-dancer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libexpat1-dev libfreetype6-dev libfontconfig1-dev

      - name: Run cargo doc
        run: cargo doc --no-deps --all-features

      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: gh-pages
          build_dir: target/doc
          fqdn: docs.quic.tech
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    permissions:
      contents: read  # DockerHub push uses DOCKER_USERNAME/DOCKER_TOKEN, not GITHUB_TOKEN
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Build Docker images
        run: make docker-build

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Publish Docker images
        run: make docker-publish
